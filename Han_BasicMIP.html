<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Han-BasicMIP 中文基本義標注工具</title>
<style>
:root {
  --bg:#0f1a14;--bg2:#162019;--bg3:#1e2d22;--bg4:#253329;
  --border:#2e4234;--border2:#3d5645;
  --accent:#5c9e6e;--accent2:#7bbf8e;
  --gold:#c9a84c;--gold2:#e8c96a;
  --text:#e8e0d0;--text2:#b8b0a0;--text3:#7a7268;
  --done-bg:#0d2417;--done-bd:#2d6e3e;
  --skip-bg:#1a1a14;--skip-bd:#3a3828;
  --N:#6baed6;--V:#fd8d3c;--other:#74c476;
  --fmain:'Georgia','標楷體',serif;
  --fui:'Trebuchet MS','Noto Sans TC',sans-serif;
  --fmono:'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fui);font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* topbar */
#topbar{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#topbar h1{font-family:var(--fmain);font-size:16px;color:var(--gold2);letter-spacing:.04em;white-space:nowrap;margin-right:6px}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--border2);border-radius:4px;background:var(--bg3);color:var(--text2);cursor:pointer;font:13px var(--fui);white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--bg4);color:var(--text);border-color:var(--accent)}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.btn.primary{background:var(--accent);border-color:var(--accent2);color:#0f1a14;font-weight:600}
.btn.primary:hover{background:var(--accent2)}
.btn.gold{background:transparent;border-color:var(--gold);color:var(--gold)}
.btn.gold:hover{background:var(--gold);color:#0f1a14}
input[type=file]{display:none}
#prog-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
#prog-text{font-size:12px;color:var(--text3);white-space:nowrap}
#prog-track{width:120px;height:6px;background:var(--bg3);border-radius:3px;border:1px solid var(--border);overflow:hidden}
#prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;width:0%}

/* start screen */
#start{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px}
.start-logo{font-family:var(--fmain);font-size:52px;color:var(--gold2);letter-spacing:.06em;text-shadow:0 0 40px rgba(201,168,76,.3)}
.start-sub{font-size:15px;color:var(--text3);letter-spacing:.05em}
.start-panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:26px 34px;display:flex;flex-direction:column;gap:14px;width:100%;max-width:480px}
.start-row{display:flex;flex-direction:column;gap:6px}
.start-row label{font-size:13px;color:var(--text2)}
.upload-row{display:flex;align-items:center;gap:10px}
.upload-status{font-size:12px;color:var(--accent2)}
.sdiv{height:1px;background:var(--border);margin:2px 0}
.start-note{font-size:11px;color:var(--text3);line-height:1.7}
.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--text3);line-height:1.7;max-width:480px}

/* main layout */
#main{display:none;flex:1;overflow:hidden}

/* nav pane */
#nav{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#nav-search{padding:7px;border-bottom:1px solid var(--border);flex-shrink:0}
#nav-input{width:100%;padding:5px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text);font:12px var(--fui);outline:none}
#nav-input::placeholder{color:var(--text3)}
#nav-chips{display:flex;gap:4px;padding:5px 7px;border-bottom:1px solid var(--border);flex-shrink:0}
.chip{font-size:11px;padding:2px 7px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .12s}
.chip.on{background:var(--accent);border-color:var(--accent);color:#0f1a14;font-weight:600}
#nav-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.nitem{padding:7px 11px;cursor:pointer;border-bottom:1px solid #1a2420;display:flex;align-items:center;justify-content:space-between;gap:5px;transition:background .1s}
.nitem:hover{background:var(--bg3)}
.nitem.on{background:var(--bg4);border-left:2px solid var(--accent);padding-left:9px}
.nword{font-family:var(--fmain);font-size:15px;color:var(--text)}
.npy{font-size:10px;color:var(--text3)}
.nbadge{font-size:10px;padding:1px 5px;border-radius:8px;flex-shrink:0}
.nbadge.done{background:var(--done-bd);color:#8fe8a0}
.nbadge.part{background:#3d3010;color:var(--gold)}
.nbadge.todo{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
#nav-count{font-size:11px;color:var(--text3);padding:5px 10px;border-top:1px solid var(--border);flex-shrink:0}

/* annot pane */
#annot{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
#word-hdr{position:sticky;top:0;z-index:10;background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 22px 11px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
#word-big{font-family:var(--fmain);font-size:34px;color:var(--gold2);line-height:1}
#word-meta{color:var(--text3);font-size:13px}
#word-nav{margin-left:auto;display:flex;align-items:center;gap:7px}
.narrow{width:28px;height:28px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .12s}
.narrow:hover{background:var(--bg4);color:var(--text);border-color:var(--accent)}
.narrow:disabled{opacity:.3;cursor:default}
#word-pos{color:var(--text3);font-size:12px}
#pos-groups{padding:18px 22px}

/* pos group card */
.pg{margin-bottom:18px;border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s}
.pg.done{border-color:var(--done-bd);background:var(--done-bg)}
.pg.skipped{border-color:var(--skip-bd);background:var(--skip-bg);opacity:.75}
.pg-hdr{display:flex;align-items:center;gap:9px;padding:9px 14px;background:rgba(0,0,0,.25);border-bottom:1px solid var(--border)}
.ptag{font-family:var(--fmono);font-size:12px;font-weight:700;padding:2px 9px;border-radius:12px;min-width:34px;text-align:center}
.ptag.N{background:rgba(107,174,214,.2);color:var(--N);border:1px solid rgba(107,174,214,.4)}
.ptag.V{background:rgba(253,141,60,.2);color:var(--V);border:1px solid rgba(253,141,60,.4)}
.ptag.O{background:rgba(116,196,118,.15);color:var(--other);border:1px solid rgba(116,196,118,.3)}
.pg-st{margin-left:auto;font-size:12px}
.st-done{color:#6ecc80}.st-skip{color:var(--text3)}.st-todo{color:var(--text3)}
.skip-lbl{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);cursor:pointer;padding:2px 4px;border-radius:3px}
.skip-lbl:hover{color:var(--text2)}
.skip-lbl input{accent-color:var(--accent);cursor:pointer}

/* senses */
.slist{padding:6px 0}
.srow{display:flex;align-items:flex-start;padding:5px 14px;border-radius:4px;margin:2px 7px;cursor:pointer;transition:background .1s}
.srow:hover{background:rgba(255,255,255,.04)}
.srow.sel{background:rgba(92,158,110,.12)}
.srow input[type=radio]{margin-top:3px;margin-right:9px;flex-shrink:0;accent-color:var(--accent);cursor:pointer;width:14px;height:14px}
.sid{font-family:var(--fmono);font-size:12px;font-weight:700;color:var(--text3);min-width:36px;flex-shrink:0;padding-top:2px}
.stxt{font-family:var(--fmain);font-size:14px;color:var(--text);line-height:1.65;flex:1;user-select:text}
.stxt.dim{color:var(--text3)}

.sug-bar{margin:3px 14px 7px;padding:6px 11px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:5px;font-size:12px;color:var(--gold)}
.confirm-row{display:flex;align-items:center;gap:7px;padding:7px 14px 11px}
.note-inp{flex:1;max-width:200px;padding:4px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text);font:12px var(--fui);outline:none}
.note-inp:focus{border-color:var(--accent)}
.note-inp::placeholder{color:var(--text3)}

/* lex pane */
#lex{width:215px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;scrollbar-width:thin}
.lsec{padding:13px 13px 10px;border-bottom:1px solid var(--border)}
.ltitle{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.lrow{margin-bottom:5px}
.llbl{font-size:11px;color:var(--text3)}
.lval{font-size:12px;color:var(--text2)}
.lfreq{font-size:17px;color:var(--accent2);font-weight:600}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.tag{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.tag.c{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.4);color:var(--gold)}

/* loading & toast */
#loading{position:fixed;inset:0;background:rgba(15,26,20,.93);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:100}
.spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{color:var(--text2);font-size:14px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:8px 18px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;white-space:nowrap}
#toast.on{opacity:1}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div id="topbar">
  <h1>Han-BasicMIP</h1>
  <div class="sep"></div>
  <button class="btn" id="btn-xlsx">📂 載入辭典 xlsx</button>
  <input type="file" id="f-xlsx" accept=".xlsx,.xlsm">
  <button class="btn" id="btn-lex" disabled>📋 詞庫 CSV（選填）</button>
  <input type="file" id="f-lex" accept=".csv">
  <button class="btn" id="btn-ann" disabled>📥 載入標注 json</button>
  <input type="file" id="f-ann" accept=".json">
  <div class="sep"></div>

</div>

<div id="start">
  <div class="start-logo">漢</div>

    標注完畢後點上方「⬇ 下載標注 json」存檔。<br>
    下次開啟時再上傳該 json 即可接續作業。<br>
    存檔 key 格式：<code style="color:var(--gold)">詞_拼音_詞性碼</code>，如 <code style="color:var(--accent2)">行_xing2_V</code>
  </div>
</div>

<div id="main">
  <div id="nav">
    <div id="nav-search"><input id="nav-input" type="text" placeholder="搜尋詞條…"></div>
    <div id="nav-chips">
      <div class="chip on" data-f="todo">待標注</div>
      <div class="chip" data-f="all">全部</div>
      <div class="chip" data-f="done">完成</div>
    </div>
    <div id="nav-list"></div>
    <div id="nav-count"></div>
  </div>
  <div id="annot">
    <div id="word-hdr">
      <div id="word-big">—</div>

        <span id="word-pos"></span>
        <button class="narrow" id="btn-prev">‹</button>

  </div>
  <div id="lex">
    <div class="lsec">
      <div class="ltitle">詞庫小組輔助</div>

<!-- SheetJS via ESM (GitHub Pages compatible) -->
<script type="module">
import * as XLSX from 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm';
window.XLSX = XLSX;
window.dispatchEvent(new Event('xlsx-ready'));
</script>

<script>
// ── 常數 ──────────────────────────────────────────────────────
const POS_EN  = {名:'N',動:'V',形:'A',副:'D',介:'P',連:'C',助:'T',嘆:'I',擬:'O',代:'R',綴:'X',量:'M',數:'Q',符:'U',頭:'H',尾:'L','—':'X'};
const ANN_POS = new Set(['名','動']);
const CONC    = new Set(['+physical','+animate','+liquid','+solid','+gas','+mammals','+birds','+plants','+flowers','+fruits','+animals','+food','+buildings','+terrains','+celestial_bodies','+materials','+clothing','+vehicles','+transportation','+machines','+apparatus','+worms&insects','+amphibians','+reptiles','+marine','+woody','+herbaceous','+human','+inanimate']);
const S2M     = {N:'名',V:'動',D:'副',A:'形',P:'介',C:'連',I:'嘆',T:'助'};

const TONE = {ā:['a','1'],á:['a','2'],ǎ:['a','3'],à:['a','4'],ē:['e','1'],é:['e','2'],ě:['e','3'],è:['e','4'],ī:['i','1'],í:['i','2'],ǐ:['i','3'],ì:['i','4'],ō:['o','1'],ó:['o','2'],ǒ:['o','3'],ò:['o','4'],ū:['u','1'],ú:['u','2'],ǔ:['u','3'],ù:['u','4'],ǖ:['v','1'],ǘ:['v','2'],ǚ:['v','3'],ǜ:['v','4'],ü:['v','']};

// ── 狀態 ──────────────────────────────────────────────────────
let dict = {};       // wordKey -> entry
let lex  = {};       // word -> {freq,pos_list,sem_features}
let ann  = {};       // pgKey -> annotation
let nav  = [];       // filtered wordKey list
let cur  = 0;
let filt = 'todo';
let xlsxReady = false;

// ── 工具函式 ──────────────────────────────────────────────────
function pyNum(py) {
  if (!py) return 'x';
  let r = '', t = '';
  for (const c of py) {
    if (TONE[c]) { const [b,d] = TONE[c]; r += b; if(d) t = d; }
    else r += c;
  }
  return r + (t||'5');
}

function pgKey(wk, pos, py) {
  return `${wk.split('_')[0]}_${pyNum(py)}_${POS_EN[pos]||'X'}`;
}

function stripEx(text) {
  text = text.replace(/如：「[^」]*(?:」[、，。；\s]*「[^」]*)*」/g,'');
  text = text.replace(/如[^。；\n「」《》]{1,30}[。；]/g,'');
  for (let i=0;i<8;i++) {
    const p=text;
    text=text.replace(/[^。；\n，、]*《[^》]+》[^「\n「」]*「[^」\n]*」[。；]?/g,'');
    text=text.replace(/[^。；\n，、]*〈[^〉]+〉[^「\n「」]*「[^」\n]*」[。；]?/g,'');
    text=text.replace(/(。)[\u4e00-\u9fa5\uff0e]{3,}[：:][「『][^」』\n]*[」』][。；]?/g,'$1');
    text=text.replace(/[^。；\n]*[\u4e00-\u9fa5]{1,4}\uff0e[\u4e00-\u9fa5\uff0e]{1,25}[：:][「『][^」』\n]*[」』][。；]?/g,'');
    if(text===p)break;
  }
  text=text.replace(/[「『][^」』\n]*$/,'');
  text=text.replace(/(。)[^。；\n]*(?:《[^》]*》|〈[^〉]*〉)[^。；\n]*[：:][。；]?/g,'$1');
  text=text.replace(/[\u4e00-\u9fa5\uff0e]{2,}[：:][。；]?/g,'');
  text=text.replace(/（[^）]+）/g,'');
  text=text.replace(/[。；\s]{2,}/g,'。').replace(/^[。；、，\s]+/,'').trim();
  if(text && !'。！？」'.includes(text.slice(-1))) text+='。';
  return text;
}

function parseSenses(raw) {
  if (!raw) return [];
  const text = raw.replace(/_x000D_/g,'').replace(/\r/g,'').trim();
  const senses = [];
  const blocks = text.split(/(\[[^\]]{1,6}\])/);
  for (let i=0;i<blocks.length;i++) {
    const b = blocks[i].trim();
    if (/^\[[^\]]{1,6}\]$/.test(b)) {
      const pos = b.slice(1,-1); i++;
      if (i<blocks.length) {
        const items = blocks[i].trim().split(/(?=^\d+\.)/m);
        for (const item of items) {
          const t = item.trim(); if (!t) continue;
          const m = t.match(/^(\d+)\.(.+)/s);
          const [num,stxt] = m ? [m[1],m[2].trim()] : ['1',t];
          if (stxt) senses.push({sid:`${pos}${num}`,pos,text:stripEx(stxt),idx:senses.length});
        }
      }
    }
  }
  if (!senses.length && text) senses.push({sid:'義1',pos:'—',text:stripEx(text),idx:0});
  return senses;
}

// ── 載入 xlsx ─────────────────────────────────────────────────
function loadXlsx(file) {
  showLoad('解析辭典中，請稍候（約 30-60 秒）…');
  document.getElementById('xlsx-st').textContent = '解析中…';
  const reader = new FileReader();
  reader.onload = e => {
    setTimeout(() => {
      try {
        const wb   = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
        const raw={}, w2z={};
        for (let i=1;i<rows.length;i++) {
          const r=rows[i];
          const word=String(r[0]||'').trim(); if(!word) continue;
          const zy=String(r[8]||'').trim(), py=String(r[11]||'').trim();
          const key=`${word}||${zy}`;
          if(!raw[key]) raw[key]={word,zy,py,rows:[]};
          raw[key].rows.push({py,senses:parseSenses(String(r[15]||''))});
          if(!w2z[word]) w2z[word]=new Set();
          w2z[word].add(zy);
        }
        dict = {};
        for (const [,entry] of Object.entries(raw)) {
          const {word,zy} = entry;
          const isPoly = w2z[word].size>1;
          const py = entry.rows[0].py;
          const wk = isPoly&&py ? `${word}_${pyNum(py)}` : word;
          const senses=[];
          for (const r of entry.rows) for (const s of r.senses) senses.push({...s,idx:senses.length});
          const grps={};
          for (const s of senses) { if(!grps[s.pos])grps[s.pos]=[]; grps[s.pos].push({sid:s.sid,text:s.text}); }
          const needs = Object.entries(grps).some(([p,ss])=>ANN_POS.has(p)&&ss.length>1);
          if (needs) dict[wk]={word,wordKey:wk,zy,py,isPoly,grps};
        }
        document.getElementById('xlsx-st').textContent = `✓ ${Object.keys(dict).length.toLocaleString()} 筆`;
        document.getElementById('btn-ann').disabled  = false;
        document.getElementById('btn-ann2').disabled = false;
        document.getElementById('btn-start').disabled= false;
        document.getElementById('btn-lex').disabled  = false;
        hideLoad();
        toast(`辭典載入：${Object.keys(dict).length.toLocaleString()} 筆需標注詞條`);
      } catch(err) {
        hideLoad();
        document.getElementById('xlsx-st').textContent = '載入失敗';
        alert('解析失敗：'+err.message+'\n\n請確認檔案為 xlsx 格式。');
      }
    },50);
  };
  reader.readAsArrayBuffer(file);
}

// ── 載入詞庫 CSV ──────────────────────────────────────────────
function loadLexCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n');
    const h = lines[0].split(',');
    const iW=h.indexOf('Word'),iF=h.indexOf('WordFreq'),iP=h.indexOf('SyntactFunction'),iS=h.indexOf('SemanticFeatures');
    lex = {};
    for (let i=1;i<lines.length;i++) {
      const c=lines[i].split(',');
      const w=(c[iW]||'').trim(); if(!w) continue;
      lex[w]={freq:parseInt(c[iF])||0,
        pos_list:(c[iP]||'').split(';').map(s=>s.trim()).filter(Boolean),
        sem_features:(c[iS]||'').split(';').map(s=>s.trim()).filter(Boolean)};
    }
    toast(`詞庫載入：${Object.keys(lex).length.toLocaleString()} 筆`);
    if (nav.length) renderWord(cur);
  };
  reader.readAsText(file,'utf-8');
}

// ── 載入/下載標注 ─────────────────────────────────────────────
function loadAnn(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      ann = JSON.parse(e.target.result);
      document.getElementById('ann-st').textContent = `✓ ${Object.keys(ann).length.toLocaleString()} 筆`;
      toast(`已載入 ${Object.keys(ann).length.toLocaleString()} 筆標注`);
      if (document.getElementById('main').style.display==='flex') { refreshNav(); renderWord(cur); }
    } catch(err) { alert('json 格式錯誤：'+err.message); }
  };
  reader.readAsText(file,'utf-8');
}

function downloadAnn() {
  const clean={};
  for (const [k,v] of Object.entries(ann)) { const {_idx,...r}=v; clean[k]=r; }
  const blob=new Blob([JSON.stringify(clean,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='basic_sense_annotations.json';
  a.click(); URL.revokeObjectURL(url);
  toast('✓ 已下載 basic_sense_annotations.json');
}

// ── 進度 ──────────────────────────────────────────────────────
function wStatus(wk) {
  const e=dict[wk]; let tot=0,dn=0;
  for (const [p,ss] of Object.entries(e.grps)) {
    if(!ANN_POS.has(p)||ss.length<=1) continue;
    tot++; if(ann[pgKey(wk,p,e.py)]) dn++;
  }
  return dn===0?'todo':dn>=tot?'done':'part';
}

function updateProgress() {
  let tot=0,dn=0;
  for (const [wk,e] of Object.entries(dict))
    for (const [p,ss] of Object.entries(e.grps)) {
      if(!ANN_POS.has(p)||ss.length<=1) continue;
      tot++; if(ann[pgKey(wk,p,e.py)]) dn++;
    }
  const pct=tot?dn/tot*100:0;
  document.getElementById('prog-text').textContent=`${dn.toLocaleString()}/${tot.toLocaleString()}（${pct.toFixed(1)}%）`;
  document.getElementById('prog-fill').style.width=`${pct}%`;
}

// ── 導覽 ──────────────────────────────────────────────────────
function refreshNav() {
  const q=document.getElementById('nav-input').value.trim().toLowerCase();
  nav = Object.keys(dict).filter(wk=>{
    const e=dict[wk];
    if(q&&!wk.includes(q)&&!e.word.includes(q)) return false;
    const st=wStatus(wk);
    if(filt==='todo') return st!=='done';
    if(filt==='done') return st==='done';
    return true;
  });
  const list=document.getElementById('nav-list');
  list.innerHTML='';
  nav.forEach((wk,i)=>{
    const e=dict[wk], st=wStatus(wk);
    const div=document.createElement('div');
    div.className='nitem'+(i===cur?' on':'');
    div.innerHTML=`<div><div class="nword">${e.isPoly?wk:e.word}</div><div class="npy">${e.zy} ${e.py}</div></div><span class="nbadge ${st}">${{done:'✓',part:'◑',todo:'○'}[st]}</span>`;
    div.addEventListener('click',()=>{ cur=i; renderWord(i); });
    list.appendChild(div);
  });
  document.getElementById('nav-count').textContent=`${nav.length.toLocaleString()} 筆`;
  updateProgress();
}

function updateNavHL() {
  document.querySelectorAll('.nitem').forEach((el,i)=>{
    el.classList.toggle('on',i===cur);
    const wk=nav[i]; if(!wk) return;
    const st=wStatus(wk);
    const b=el.querySelector('.nbadge');
    b.className=`nbadge ${st}`;
    b.textContent={done:'✓',part:'◑',todo:'○'}[st];
  });
}

// ── 詞條渲染 ─────────────────────────────────────────────────
function renderWord(idx) {
  cur=idx;
  const wk=nav[idx]; if(!wk) return;
  const e=dict[wk];
  document.getElementById('word-big').textContent=e.isPoly?wk:e.word;
  document.getElementById('word-meta').textContent=`${e.zy}  ${e.py}${e.isPoly?'  ·破音字':''}`;
  document.getElementById('word-pos').textContent=`${idx+1} / ${nav.length}`;
  document.getElementById('btn-prev').disabled=idx<=0;
  document.getElementById('btn-next').disabled=idx>=nav.length-1;
  renderLex(e.word);
  const cont=document.getElementById('pos-groups');
  cont.innerHTML='';
  for (const [pos,senses] of Object.entries(e.grps)) {
    cont.appendChild(buildPosGroup(wk,e,pos,senses));
  }
  updateNavHL();
  updateProgress();
  document.querySelectorAll('.nitem')[idx]?.scrollIntoView({block:'nearest'});
}

function buildPosGroup(wk,entry,pos,senses) {
  const k      = pgKey(wk,pos,entry.py);
  const a      = ann[k];
  const isDone = a&&!a.skipped;
  const isSkip = a&&a.skipped;
  const isMulti    = senses.length>1;
  const isAnnotate = ANN_POS.has(pos);

  const grp=document.createElement('div');
  grp.className='pg'+(isDone?' done':isSkip?' skipped':'');
  grp.id='pg-'+k.replace(/[^a-z0-9]/gi,'_');

  // ── header ──
  const hdr=document.createElement('div'); hdr.className='pg-hdr';
  const ptag=document.createElement('span');
  ptag.className='ptag '+(pos==='名'?'N':pos==='動'?'V':'O');
  ptag.textContent=`[${pos}]`;
  hdr.appendChild(ptag);

  // skip checkbox
  const skipLbl=document.createElement('label'); skipLbl.className='skip-lbl';
  const skipCb=document.createElement('input'); skipCb.type='checkbox';
  skipCb.checked=isSkip;
  skipCb.addEventListener('change',()=>doSkip(wk,entry,pos,k,grp,stEl,skipCb.checked));
  skipLbl.appendChild(skipCb);
  skipLbl.appendChild(document.createTextNode('略過'));
  hdr.appendChild(skipLbl);

  // status
  const stEl=document.createElement('span'); stEl.className='pg-st';
  stEl.innerHTML=isDone?'<span class="st-done">✓ 已標注</span>':
                 isSkip?'<span class="st-skip">略過</span>':
                        '<span class="st-todo">待標注</span>';
  hdr.appendChild(stEl);
  grp.appendChild(hdr);

  if (!isAnnotate||!isMulti) {
    // 只顯示義項，不提供 Radio
    const sl=document.createElement('div'); sl.className='slist';
    for (const s of senses.slice(0,isAnnotate?undefined:4)) {
      const row=document.createElement('div'); row.className='srow'; row.style.cursor='default';
      row.innerHTML=`<span class="sid">[${s.sid}]</span><span class="stxt dim">${s.text}</span>`;
      sl.appendChild(row);
    }
    if(!isAnnotate&&senses.length>4) {
      const more=document.createElement('div');
      more.style.cssText='padding:3px 14px;font-size:11px;color:var(--text3)';
      more.textContent=`…共 ${senses.length} 條`;
      sl.appendChild(more);
    }
    if(isAnnotate&&!isMulti&&isDone) {
      const note=document.createElement('div');
      note.style.cssText='padding:3px 14px 8px;font-size:12px;color:var(--accent2)';
      note.textContent='（單義項，已自動採用）';
      sl.appendChild(note);
    }
    grp.appendChild(sl);
    return grp;
  }

  // 多義項名/動：Radio 選基本義
  const sugI = suggestIdx(entry.word,pos,senses);
  if (sugI!==null&&!isDone) {
    const bar=document.createElement('div'); bar.className='sug-bar';
    bar.textContent=`★ 建議：[${senses[sugI].sid}] ${senses[sugI].text.slice(0,48)}…（依詞庫具體性特徵）`;
    grp.appendChild(bar);
  }

  const rname=`r_${k.replace(/[^a-z0-9]/gi,'_')}`;
  const sl=document.createElement('div'); sl.className='slist';
  const curVal = a&&!a.skipped ? a._idx : null;

  for (const s of senses) {
    const row=document.createElement('div');
    row.className='srow'+(curVal===s.idx?' sel':'');
    row.id=`row_${rname}_${s.idx}`;

    const rb=document.createElement('input'); rb.type='radio';
    rb.name=rname; rb.value=s.idx;
    rb.checked=(curVal===s.idx)||(curVal===null&&sugI===s.idx&&!isDone);
    rb.addEventListener('change',()=>highlightRow(rname,s.idx));

    const sid=document.createElement('span'); sid.className='sid'; sid.textContent=`[${s.sid}]`;
    const stxt=document.createElement('span'); stxt.className='stxt'; stxt.textContent=s.text;

    row.appendChild(rb); row.appendChild(sid); row.appendChild(stxt);
    row.addEventListener('click',e=>{ if(e.target!==rb){rb.checked=true; rb.dispatchEvent(new Event('change'));} });
    sl.appendChild(row);
  }
  grp.appendChild(sl);

  // confirm row
  const cr=document.createElement('div'); cr.className='confirm-row';
  const noteInp=document.createElement('input'); noteInp.className='note-inp'; noteInp.type='text';
  noteInp.placeholder='備注（可留空）';
  noteInp.value=a?a.annotator_note||'':'';
  noteInp.id=`note_${k.replace(/[^a-z0-9]/gi,'_')}`;

  const cfBtn=document.createElement('button'); cfBtn.className='btn primary';
  cfBtn.textContent='✓ 確認';
  cfBtn.style.cssText='padding:4px 12px';
  cfBtn.addEventListener('click',()=>doConfirm(wk,entry,pos,k,senses,rname,grp,stEl));

  const clBtn=document.createElement('button'); clBtn.className='btn';
  clBtn.textContent='清除';
  clBtn.style.cssText='padding:4px 9px';
  clBtn.addEventListener('click',()=>doClear(wk,entry,pos,k,rname,sugI,grp,stEl));

  cr.appendChild(noteInp); cr.appendChild(cfBtn); cr.appendChild(clBtn);
  grp.appendChild(cr);
  return grp;
}

function highlightRow(rname,idx) {
  document.querySelectorAll(`[id^="row_${rname}_"]`).forEach(el=>el.classList.remove('sel'));
  document.getElementById(`row_${rname}_${idx}`)?.classList.add('sel');
}

function suggestIdx(word,pos,senses) {
  const info=lex[word]; if(!info) return null;
  if(!info.sem_features.some(f=>CONC.has(f))) return null;
  const lp=new Set(info.pos_list.map(c=>S2M[c.replace(/^!/,'')[0]]).filter(Boolean));
  return lp.has(pos)&&senses.length ? 0 : null;
}

// ── 標注動作（純 DOM，不含字串插值 onclick）──────────────────
function doConfirm(wk,entry,pos,k,senses,rname,grp,stEl) {
  const checked=document.querySelector(`[name="${rname}"]:checked`);
  if(!checked){ toast('請先選擇一個義項',true); return; }
  const idx=parseInt(checked.value);
  const sense=senses.find(s=>s.idx===idx);
  if(!sense){ toast('找不到對應義項，請重試',true); return; }
  const noteEl=document.getElementById(`note_${k.replace(/[^a-z0-9]/gi,'_')}`);
  ann[k]={word_key:wk,word:entry.word,zhuyin:entry.zy,pos,
    basic_sense_id:sense.sid,basic_sense_text:sense.text,
    _idx:idx,source:'manual',skipped:false,
    annotator_note:noteEl?noteEl.value:''};
  grp.className='pg done';
  stEl.innerHTML='<span class="st-done">✓ 已標注</span>';
  updateNavHL(); updateProgress();
  toast(`已儲存：${wk}[${pos}] → [${sense.sid}]`);
}

function doClear(wk,entry,pos,k,rname,sugI,grp,stEl) {
  delete ann[k];
  grp.className='pg';
  stEl.innerHTML='<span class="st-todo">待標注</span>';
  document.querySelectorAll(`[name="${rname}"]`).forEach(r=>{ r.checked=false; });
  document.querySelectorAll(`[id^="row_${rname}_"]`).forEach(el=>el.classList.remove('sel'));
  if(sugI!==null){
    const sugSense=senses[sugI];
    if(sugSense){
      const sugRb=document.querySelector(`[name="${rname}"][value="${sugSense.idx}"]`);
      if(sugRb){ sugRb.checked=true; highlightRow(rname,sugSense.idx); }
    }
  }
  updateNavHL(); updateProgress();
  toast(`已清除：${wk}[${pos}]`);
}

function doSkip(wk,entry,pos,k,grp,stEl,checked) {
  if(checked){
    ann[k]={word_key:wk,word:entry.word,zhuyin:entry.zy,pos,
      basic_sense_id:'',basic_sense_text:'',source:'manual_skip',skipped:true,annotator_note:''};
    grp.className='pg skipped';
    stEl.innerHTML='<span class="st-skip">略過</span>';
  } else {
    delete ann[k];
    grp.className='pg';
    stEl.innerHTML='<span class="st-todo">待標注</span>';
  }
  updateNavHL(); updateProgress();
}

// ── 詞庫右欄 ─────────────────────────────────────────────────
function renderLex(word) {
  const info=lex[word];
  const cont=document.getElementById('lex-body');
  if(!info){ cont.innerHTML='<div style="color:var(--text3);font-size:12px">無對應詞條</div>'; return; }
  const conc=info.sem_features.filter(f=>CONC.has(f));
  const other=info.sem_features.filter(f=>!CONC.has(f));
  const pTags=info.pos_list.map(p=>`<span class="tag">${p}</span>`).join('');
  const cTags=conc.map(f=>`<span class="tag c">${f}</span>`).join('');
  const oTags=other.map(f=>`<span class="tag">${f}</span>`).join('');
  cont.innerHTML=`
    <div class="lrow"><div class="llbl">詞頻</div><div class="lfreq">${info.freq.toLocaleString()}</div></div>
    <div class="lrow" style="margin-top:9px"><div class="llbl">句法碼</div><div class="tags">${pTags||'<span style="color:var(--text3);font-size:11px">無</span>'}</div></div>
    ${conc.length?`<div class="lrow" style="margin-top:9px"><div class="llbl" style="color:var(--gold)">★ 具體性特徵</div><div class="tags">${cTags}</div></div>`:''}
    ${other.length?`<div class="lrow" style="margin-top:7px"><div class="llbl">其他語義特徵</div><div class="tags">${oTags}</div></div>`:''}`;
}

// ── UI helpers ───────────────────────────────────────────────
function showLoad(msg){ document.getElementById('ltxt').textContent=msg||'處理中…'; document.getElementById('loading').style.display='flex'; }
function hideLoad(){ document.getElementById('loading').style.display='none'; }
let _tt;
function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.borderColor=err?'#c0392b':'var(--border2)';
  el.classList.add('on'); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('on'),3000);
}

// ── 事件綁定（全部在這裡，不用 innerHTML onclick）───────────
window.addEventListener('DOMContentLoaded',()=>{
  // xlsx
  const fxlsx=document.getElementById('f-xlsx');
  document.getElementById('btn-xlsx').addEventListener('click',()=>fxlsx.click());
  document.getElementById('btn-xlsx2').addEventListener('click',()=>fxlsx.click());
  fxlsx.addEventListener('change',e=>{ const f=e.target.files[0]; if(f&&xlsxReady)loadXlsx(f); else if(f&&!xlsxReady){toast('SheetJS 尚未載入，請稍候再試',true);} fxlsx.value=''; });

  // lex csv
  const flex=document.getElementById('f-lex');
  document.getElementById('btn-lex').addEventListener('click',()=>flex.click());
  flex.addEventListener('change',e=>{ const f=e.target.files[0]; if(f)loadLexCSV(f); flex.value=''; });

  // annotations
  const fann=document.getElementById('f-ann');
  document.getElementById('btn-ann').addEventListener('click',()=>fann.click());
  document.getElementById('btn-ann2').addEventListener('click',()=>fann.click());
  fann.addEventListener('change',e=>{ const f=e.target.files[0]; if(f)loadAnn(f); fann.value=''; });

  // download
  document.getElementById('btn-dl').addEventListener('click',downloadAnn);

  // start
  document.getElementById('btn-start').addEventListener('click',()=>{
    document.getElementById('start').style.display='none';
    document.getElementById('main').style.display='flex';
    document.getElementById('btn-dl').disabled=false;
    refreshNav();
    if(nav.length) renderWord(0);
  });

  // nav chips
  document.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click',()=>{
      document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      c.classList.add('on'); filt=c.dataset.f; cur=0; refreshNav();
    });
  });

  // nav search
  document.getElementById('nav-input').addEventListener('input',()=>{ cur=0; refreshNav(); });

  // prev/next
  document.getElementById('btn-prev').addEventListener('click',()=>{ if(cur>0){cur--;renderWord(cur);} });
  document.getElementById('btn-next').addEventListener('click',()=>{ if(cur<nav.length-1){cur++;renderWord(cur);} });

  // keyboard
  document.addEventListener('keydown',e=>{
    if(document.getElementById('main').style.display!=='flex') return;
    if(e.target.tagName==='INPUT') return;
    if(e.key==='ArrowRight'&&cur<nav.length-1){cur++;renderWord(cur);}
    if(e.key==='ArrowLeft'&&cur>0){cur--;renderWord(cur);}
  });
});

// SheetJS 就緒旗標
window.addEventListener('xlsx-ready',()=>{ xlsxReady=true; });
</script>
